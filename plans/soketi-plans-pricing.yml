specification: API Commons Plans
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/Plans
provider: Soketi
providerId: soketi
created: '2026-05-08'
modified: '2026-05-08'
reconciled: true
tags:
  - Realtime
  - Open Source
  - Plans
description: >-
  Soketi is open source under MIT license. There is no SaaS subscription. Cost to run Soketi at
  scale is the cost of compute, memory, and (for horizontal scaling) Redis used to host it.
  Operators may choose to use a hosted Soketi managed service if available; otherwise self-hosted.
sources:
  - https://soketi.app/
  - https://github.com/soketi/soketi
plans:
  - id: soketi-self-host
    name: Self-host (OSS)
    type: open
    description: Free, MIT-licensed - self-host on your infrastructure.
    entries:
      - label: Subscription
        name: oss_subscription
        type: subscription
        metric: month
        limit: -1
        timeFrame: month
        geo: global
        unit: 1
        price: '0.00'
        userMultiplied: false
    elements:
      - name: MIT license
      - name: Self-operated infrastructure
maintainers:
